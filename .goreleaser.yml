version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: ga-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X github.com/techinpark/ga-cli/internal/auth.oauthClientID={{.Env.OAUTH_CLIENT_ID}} -X github.com/techinpark/ga-cli/internal/auth.oauthClientSecret={{.Env.OAUTH_CLIENT_SECRET}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: techinpark
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/techinpark/ga-cli"
    description: "Google Analytics 4 CLI tool — query DAU, events, countries, platforms, and realtime data from the terminal"
    license: "MIT"
    install: |
      bin.install "ga-cli"
    test: |
      system "#{bin}/ga-cli", "--version"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
